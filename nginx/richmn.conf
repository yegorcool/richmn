# Richmn — nginx: раздача /storage/ (иконки предметов для админки и игры)
#
# ═══════════════════════════════════════════════════════════════════════════
# КУДА ВСТАВИТЬ
# ═══════════════════════════════════════════════════════════════════════════
# В файл виртуального хоста для tg.richmn.com (и при необходимости max.richmn.com),
# обычно один из:
#   /etc/nginx/sites-available/richmn
#   /etc/nginx/sites-enabled/richmn
#   /etc/nginx/conf.d/richmn.conf
#
# Блок location ^~ /storage/ { ... } должен быть ВНУТРИ server { ... }
# и РАНЬШЕ чем location / с try_files ... /index.html (иначе SPA съест запрос).
#
# Замените /var/www/richmn на реальный путь к репозиторию на сервере.
# ═══════════════════════════════════════════════════════════════════════════

    location ^~ /storage/ {
        alias /var/www/richmn/backend/storage/app/public/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

# Пояснение:
# - Запрос  GET /storage/items/coffee/lv1.png
#   отдаёт файл  .../backend/storage/app/public/items/coffee/lv1.png
# - Симлинк public/storage на сервере для этого не обязателен (nginx читает alias).
# - php artisan storage:link всё равно полезен для локальной разработки.
